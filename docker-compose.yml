# Local development infrastructure for graph-RAG_CookBook.
# Start with `make up`; stop with `make down`.
#
# FalkorDB (DEC-002) — Redis-based graph database, Cypher-compatible.
# Qdrant — vector database for chunk + entity embeddings.

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: graph-rag-falkordb
    restart: unless-stopped
    ports:
      # Host port 6390 → container port 6379. Default Redis port (6379) is
      # commonly already bound on developer machines (e.g., a separate Redis
      # for another project); using a project-specific host port avoids
      # conflicts. The container internally still speaks Redis on 6379.
      - "6390:6379"
    volumes:
      - falkordb-data:/data
    environment:
      # Memory cap — adjust per host. FalkorDB is Redis-based; tune carefully.
      FALKORDB_ARGS: "--maxmemory 2gb --maxmemory-policy noeviction"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: graph-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    # No healthcheck: the official qdrant/qdrant image is minimal and ships
    # no HTTP-check tools (curl, wget, nc). Liveness is verified externally
    # via `curl http://localhost:6333/healthz` from the host.

volumes:
  falkordb-data:
    name: graph-rag-falkordb-data
  qdrant-data:
    name: graph-rag-qdrant-data
